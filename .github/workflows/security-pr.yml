name: Security PR Pipeline

on:
  pull_request:
    branches:
      - test

jobs:
  security_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify start security review
        run: |
          python scripts/notify_telegram.py --message "Inicio de revision de seguridad para PR #${{ github.event.pull_request.number }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run ML security scan
        run: |
          python scripts/score_diff.py \
            --base ${{ github.event.pull_request.base.sha }} \
            --head ${{ github.event.pull_request.head.sha }} \
            --repo ${{ github.workspace }} \
            --model ml/model.joblib \
            --out report.json

      - name: Load report
        id: report
        run: |
          python - <<'PY'
          import json
          import os

          with open("report.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          details = str(data.get("details", "")).replace("\n", " ")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"label={data.get('label')}\n")
              out.write(f"probability={data.get('probability')}\n")
              out.write(f"details={details}\n")
              out.write(f"vuln_type={data.get('vuln_type')}\n")
          PY

      - name: Notify classification result
        run: |
          python scripts/notify_telegram.py --message "Resultado ML: ${{ steps.report.outputs.label }} (prob=${{ steps.report.outputs.probability }}) Tipo=${{ steps.report.outputs.vuln_type }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Comment and block PR on vulnerability
        if: steps.report.outputs.label == 'VULNERABLE'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const details = `${{ steps.report.outputs.details }}`;
            const probability = `${{ steps.report.outputs.probability }}`;
            const vulnType = `${{ steps.report.outputs.vuln_type }}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `Rechazado por ML. Probabilidad: ${probability}. Tipo: ${vulnType}. Detalle: ${details}`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ["fixing-required"]
            });

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Fixing required for PR #${prNumber}`,
              body: `El modelo detecto vulnerabilidad. Tipo: ${vulnType}. Probabilidad: ${probability}.`
            });

      - name: Notify rejection
        if: steps.report.outputs.label == 'VULNERABLE'
        run: |
          python scripts/notify_telegram.py --message "PR #${{ github.event.pull_request.number }} rechazado por vulnerabilidad. Prob=${{ steps.report.outputs.probability }} Tipo=${{ steps.report.outputs.vuln_type }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Fail pipeline on vulnerability
        if: steps.report.outputs.label == 'VULNERABLE'
        run: exit 1

  tests_and_merge:
    needs: security_scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Run tests
        id: tests
        run: mvn -q test

      - name: Notify tests result
        if: always()
        run: |
          STATUS="exitosas"
          if [ "${{ steps.tests.outcome }}" != "success" ]; then STATUS="fallidas"; fi
          python scripts/notify_telegram.py --message "Resultado de pruebas: ${STATUS} en PR #${{ github.event.pull_request.number }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Label PR on test failure
        if: steps.tests.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ["tests-failed"]
            });

      - name: Stop on test failure
        if: steps.tests.outcome != 'success'
        run: exit 1

      - name: Merge PR into test
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: "squash"
            });

      - name: Notify merge to test
        run: |
          python scripts/notify_telegram.py --message "Merge automatico a test realizado para PR #${{ github.event.pull_request.number }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Create PR from test to main
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto PR test -> main (from PR #${context.payload.pull_request.number})`,
              head: "test",
              base: "main",
              body: "PR creado automaticamente despues de pruebas exitosas."
            });

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: "squash"
            });
