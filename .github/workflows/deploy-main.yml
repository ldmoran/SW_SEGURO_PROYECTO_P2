name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify deploy start
        run: |
          python scripts/notify_telegram.py --message "Inicio de despliegue a produccion (main)"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Build Docker image
        run: |
          docker build -t secure-ci:latest .

      - name: Notify deploy triggered
        run: |
          python scripts/notify_telegram.py --message "Deploy disparado via integracion GitHub de Railway."
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify deploy success
        if: success()
        run: |
          python scripts/notify_telegram.py --message "Workflow de deploy finalizado (Railway continua el despliegue)."
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify deploy failure
        if: failure()
        run: |
          python scripts/notify_telegram.py --message "Despliegue en produccion fallido."
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}